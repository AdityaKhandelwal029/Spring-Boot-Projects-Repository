# =========================================
# Server Configuration
# =========================================
server.port=8080

# =========================================
# H2 In-Memory Database Configuration
# =========================================
# JDBC URL: jdbc:h2:mem:<dbname>  -> data lives only in memory while the app runs
spring.datasource.url=jdbc:h2:mem:employeedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =========================================
# JPA / Hibernate Configuration
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop = create schema on startup, drop on shutdown (good for dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# H2 Web Console (handy for debugging)
# Visit: http://localhost:8080/h2-console
# JDBC URL field must match spring.datasource.url above
# =========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================
# Load sample data from data.sql on startup
# =========================================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
